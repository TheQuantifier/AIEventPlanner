services:
  - type: web
    name: ai-event-planner-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: APP_STAGE
        value: testing
      - key: EMAIL_CLIENT_PROVIDER
        sync: false
      - key: EMAIL_CLIENT_API_KEY
        sync: false
      - key: EMAIL_CLIENT_API_BASE
        sync: false
      - key: EMAIL_CLIENT_DOMAIN
        sync: false
      - key: EMAIL_CLIENT_SENDER_NAME
        sync: false
      - key: EMAIL_CLIENT_SENDER_EMAIL
        sync: false
      - key: EMAIL_CLIENT_REPLY_TO
        sync: false
      - key: EMAIL_CLIENT_INBOUND_DOMAIN
        sync: false
      - key: EMAIL_CLIENT_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_CLIENT_WEBHOOK_SIGNING_KEY
        sync: false
      - key: EMAIL_CLIENT_TEST_MODE
        sync: false
      - key: EMAIL_CLIENT_TEST_RECIPIENT
        sync: false
      - key: DB_PROVIDER
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_DIRECT_URL
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: APP_BASE_URL
        sync: false

  - type: web
    name: ai-event-planner-web
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:web
    envVars:
      - key: APP_STAGE
        value: testing
      - key: API_BASE_URL
        sync: false
