<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Event Planner</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AI Event Planner</p>
        <h1>Plan the feeling first. The rest follows.</h1>
        <p class="lede">
          Describe the event, set the basics, and let the planner shape ideas and shortlist the right options.
        </p>
        <div id="system-status" class="system-status hidden"></div>
      </section>

      <section class="panel intake-panel">
          <form id="planner-form" class="planner-form">
            <label class="field field-large">
              <span>What are you planning?</span>
              <textarea id="brief" name="brief" placeholder="Example: I want a stylish company dinner for 80 people in Chicago this fall."></textarea>
            </label>

            <div class="grid">
              <label class="field">
                <span>Budget</span>
                <input id="budget" name="budget" placeholder="$12,000">
              </label>
              <label class="field">
                <span>Location</span>
                <input id="location" name="location" placeholder="Chicago">
              </label>
              <label class="field">
                <span>Dates</span>
                <input id="dates" name="dates" placeholder="June 10 to June 14">
              </label>
              <label class="field">
                <span>Theme</span>
                <input id="theme" name="theme" placeholder="Minimal, garden party, modern luxury">
              </label>
              <label class="field">
                <span>Guest count</span>
                <input id="guestCount" name="guestCount" type="number" min="1" placeholder="100">
              </label>
            </div>

            <div class="action-row">
              <button type="submit">Get ideas</button>
              <button id="continue-button" type="button" class="secondary hidden">See recommendations</button>
            </div>
          </form>
      </section>

      <section id="intake-results" class="panel hidden">
        <h2>Planner notes</h2>
        <div id="assistant-message" class="summary"></div>
        <div id="detected-type" class="suggestions"></div>
        <div id="follow-up-questions" class="follow-up-list"></div>
      </section>

      <section id="results" class="results hidden">
        <div class="panel">
          <h2>Your event direction</h2>
          <div id="event-summary" class="summary"></div>
          <div id="suggestions" class="suggestions"></div>
          <div class="action-row section-actions">
            <button id="send-inquiries-button" type="button" class="hidden">Start outreach</button>
          </div>
          <div id="outreach-status" class="follow-up-list hidden"></div>
        </div>

        <div class="panel">
          <h2>Recommended matches</h2>
          <div id="shortlist" class="shortlist"></div>
        </div>

        <div class="panel">
          <h2>Communication log</h2>
          <div id="message-log" class="follow-up-list"></div>
          <div id="inbound-log" class="follow-up-list"></div>
        </div>

        <div id="selection-status" class="panel hidden"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
